services:
  postgres:
    image: postgres:16
    container_name: vsp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vsp
      POSTGRES_PASSWORD: vsp_dev_password
      POSTGRES_DB: vsp_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: vsp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
